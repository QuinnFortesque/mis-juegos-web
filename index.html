<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Diario Gamer</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .auth-btn { padding: 8px 16px; font-size: 14px; background: white; color: black; border-radius: 20px; border: none; font-weight: bold; cursor: pointer;}
        h1 { color: #60a5fa; margin: 0; }
        .form-wrapper { max-width: 500px; margin: 0 auto 30px auto; background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .submit-btn { background: var(--primary); font-weight: bold; cursor: pointer; transition: 0.3s; border: none; }
        .submit-btn:hover { background: #2563eb; }
        .search-results { position: absolute; top: 100%; left: 0; width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 6px; max-height: 250px; overflow-y: auto; z-index: 100; display: none; }
        .search-item { display: flex; align-items: center; padding: 10px; cursor: pointer; border-bottom: 1px solid #334155; }
        .grid-coleccion { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; width: 100%; }
        .game-card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .game-cover { width: 100%; height: 300px; object-fit: cover; }
        .game-info { padding: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h1>🎮 Mi Diario Gamer</h1>
            <button id="authBtn" class="auth-btn">Iniciar Sesión</button>
        </div>
        <div id="welcome-msg" style="text-align: center; margin-bottom: 20px;">Cargando...</div>
        <div class="form-wrapper" id="form-container" style="display:none;">
            <input type="text" id="gameTitle" placeholder="Busca un juego..." autocomplete="off">
            <div id="searchResults" class="search-results"></div>
            <select id="gameStatus">
                <option value="Pendiente">Pendiente</option>
                <option value="Jugando">Jugando</option>
                <option value="Completado">Completado</option>
            </select>
            <input type="number" id="gameScore" placeholder="Puntuación (0-100)">
            <button id="addBtn" class="submit-btn">Añadir</button>
        </div>
        <div id="gameList" class="grid-coleccion"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvAFDPrz2HzZZhZ1Q6VHPSHYYPYrAqKis",
            authDomain: "miwebjuegos.firebaseapp.com",
            projectId: "miwebjuegos",
            storageBucket: "miwebjuegos.firebasestorage.app",
            messagingSenderId: "437668711448",
            appId: "1:437668711448:web:46de41c01ce58bc707c76d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const juegosRef = collection(db, "juegos");
        const ADMIN_EMAIL = "joaquinrodriguezmartos7@gmail.com";

        document.getElementById('authBtn').addEventListener('click', () => {
            if (auth.currentUser) signOut(auth);
            else signInWithPopup(auth, provider).catch(e => console.error(e));
        });

        onAuthStateChanged(auth, (user) => {
            const isAdm = user && user.email === ADMIN_EMAIL;
            document.getElementById('authBtn').innerText = user ? "Cerrar Sesión" : "Iniciar Sesión";
            document.getElementById('welcome-msg').innerText = isAdm ? "¡Hola jefe!" : "Modo visitante";
            document.getElementById('form-container').style.display = isAdm ? "block" : "none";
            cargarJuegos(isAdm);
        });

        async function cargarJuegos(isAdm) {
            const list = document.getElementById('gameList');
            const snapshot = await getDocs(juegosRef);
            list.innerHTML = "";
            snapshot.forEach(docSnap => {
                const g = docSnap.data();
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<img src="${g.cover || ''}" class="game-cover"><div class="game-info"><h3>${g.title}</h3><p>${g.score}/100</p></div>`;
                list.appendChild(card);
            });
        }
    </script>
</body>
</html>
