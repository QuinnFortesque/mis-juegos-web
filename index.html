<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Diario Gamer</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .game-card { background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 8px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        button { background: #3b82f6; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Mi Diario Gamer</h1>
        <p>Temporada 2026</p>
        
        <div class="game-card">
            <input type="text" id="gameTitle" placeholder="Nombre del juego...">
            <select id="gameStatus">
                <option value="Pendiente">Pendiente</option>
                <option value="Jugando">Jugando</option>
                <option value="Drapeado">Drapeado</option>
                <option value="Completado">Completado</option>
            </select>
            <input type="number" id="gameScore" placeholder="Puntuación (0-100)" min="0" max="100">
            <button onclick="addGame()">Añadir Juego</button>
        </div>

        <div id="gameList"></div>
    </div>

    <script>
        let games = JSON.parse(localStorage.getItem('myGames')) || [];

        function renderGames() {
            const list = document.getElementById('gameList');
            list.innerHTML = games.map((g, i) => `
                <div class="game-card">
                    <h3>${g.title} (${g.score}/100)</h3>
                    <p>Estado: ${g.status}</p>
                    <button onclick="deleteGame(${i})" style="background:#ef4444">Eliminar</button>
                </div>
            `).join('');
        }

        function addGame() {
            const title = document.getElementById('gameTitle').value;
            const status = document.getElementById('gameStatus').value;
            const score = document.getElementById('gameScore').value;
            if(!title) return;
            
            games.push({ title, status, score });
            localStorage.setItem('myGames', JSON.stringify(games));
            renderGames();
        }

        function deleteGame(index) {
            games.splice(index, 1);
            localStorage.setItem('myGames', JSON.stringify(games));
            renderGames();
        }

        renderGames();
    </script>
</body>
</html>
