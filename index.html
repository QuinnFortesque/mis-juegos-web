<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Diario Gamer</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Contenedor ampliado para la cuadrícula */
        .container { width: 100%; max-width: 1000px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .auth-btn { padding: 8px 16px; font-size: 14px; background: white; color: black; border-radius: 20px; border: none; font-weight: bold; cursor: pointer;}
        h1 { color: #60a5fa; margin: 0; }

        /* Estilos del formulario centralizado */
        .form-wrapper { max-width: 500px; margin: 0 auto 30px auto; background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .submit-btn { background: var(--primary); font-weight: bold; cursor: pointer; transition: 0.3s; border: none; }
        .submit-btn:hover { background: #2563eb; }

        /* Buscador Autocompletado */
        .input-group { position: relative; width: 100%; }
        .search-results {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: #1e293b; border: 1px solid #334155; border-radius: 6px;
            max-height: 250px; overflow-y: auto; z-index: 100; display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .search-item { display: flex; align-items: center; padding: 10px; cursor: pointer; border-bottom: 1px solid #334155; transition: 0.2s; }
        .search-item:hover { background: #334155; }
        .search-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; margin-right: 12px; }

        /* Cuadrícula de Juegos (Estilo Netflix) */
        .grid-coleccion {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px; width: 100%; margin-top: 20px;
        }
        .game-card { 
            background: var(--card); border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; flex-direction: column;
            transition: transform 0.2s;
        }
        .game-card:hover { transform: translateY(-5px); }
        .game-cover { width: 100%; height: 300px; object-fit: cover; border-bottom: 2px solid #334155; }
        .game-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .game-title { margin: 0 0 10px 0; font-size: 16px; font-weight: bold; line-height: 1.2; }
        .game-meta { display: flex; justify-content: space-between; color: #94a3b8; font-size: 14px; margin-bottom: 15px;}
        .delete-btn { background: #ef4444; border: none; padding: 8px; margin: 0; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h1>🎮 Mi Diario Gamer</h1>
            <button id="authBtn" class="auth-btn">Iniciar Sesión</button>
        </div>

        <div id="welcome-msg" style="text-align: center; margin-bottom: 20px; color: #94a3b8; font-size: 14px;">
            Modo visitante. Solo lectura.
        </div>

        <div class="form-wrapper" id="form-container" style="display:none;">
            <div class="input-group">
                <input type="text" id="gameTitle" placeholder="Busca un juego..." autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>
            <select id="gameStatus">
                <option value="Pendiente">Pendiente</option>
                <option value="Jugando">Jugando</option>
                <option value="Completado">Completado</option>
            </select>
            <input type="number" id="gameScore" placeholder="Puntuación (0-100)">
            <button id="addBtn" class="submit-btn">Añadir a mi colección</button>
        </div>
        
        <div id="gameList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // --- 1. TUS CLAVES Y CONFIGURACIÓN ---
        const RAWG_API_KEY = "cbb476e3ee2f4789b09fdd9b0425a7fd; 
        const ADMIN_EMAIL = "joaquinrodriguezmartos7@gmail.com"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCf6mVbBLUgwiBOQBf0pAnSg-NLIHFEjtc",
            authDomain: "miwebjuegos.firebaseapp.com",
            databaseURL: "https://miwebjuegos-default-rtdb.firebaseio.com",
            projectId: "miwebjuegos",
            storageBucket: "miwebjuegos.firebasestorage.app",
            messagingSenderId: "437668711448",
            appId: "1:437668711448:web:46de41c01ce58bc707c76d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const juegosRef = collection(db, "juegos");
        
        let isUserAdmin = false;
        let selectedCover = "https://via.placeholder.com/400x500/1e293b/ffffff?text=Sin+Portada";

        // --- 2. LÓGICA DEL BUSCADOR RAWG ---
        const titleInput = document.getElementById('gameTitle');
        const searchResults = document.getElementById('searchResults');
        let searchTimeout = null;

        titleInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const queryText = e.target.value.trim();
            
            if(queryText.length < 3) {
                searchResults.style.display = 'none';
                selectedCover = "https://via.placeholder.com/400x500/1e293b/ffffff?text=Sin+Portada";
                return;
            }

            // Debounce: Espera 0.5s al dejar de escribir para no saturar la API
            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`https://api.rawg.io/api/games?key=${RAWG_API_KEY}&search=${queryText}&page_size=5`);
                    const data = await response.json();
                    
                    searchResults.innerHTML = '';
                    if(data.results.length > 0) {
                        searchResults.style.display = 'block';
                        data.results.forEach(game => {
                            const div = document.createElement('div');
                            div.className = 'search-item';
                            div.innerHTML = `
                                <img src="${game.background_image || 'https://via.placeholder.com/50/1e293b/ffffff?text=?'}" alt="cover">
                                <span>${game.name}</span>
                            `;
                            div.onclick = () => {
                                titleInput.value = game.name;
                                selectedCover = game.background_image || "https://via.placeholder.com/400x500/1e293b/ffffff?text=Sin+Portada";
                                searchResults.style.display = 'none';
                            };
                            searchResults.appendChild(div);
                        });
                    } else {
                        searchResults.style.display = 'none';
                    }
                } catch(err) {
                    console.error("Error consultando RAWG:", err);
                }
            }, 500);
        });

        // Ocultar buscador al hacer clic fuera
        document.addEventListener('click', (e) => {
            if (!titleInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.style.display = 'none';
            }
        });

        // --- 3. AUTENTICACIÓN GOOGLE ---
        const authBtn = document.getElementById('authBtn');
        const welcomeMsg = document.getElementById('welcome-msg');
        const formContainer = document.getElementById('form-container');

        authBtn.addEventListener('click', () => {
            if (auth.currentUser) { signOut(auth); } 
            else { signInWithPopup(auth, provider).catch(e => console.log(e)); }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authBtn.innerText = "Cerrar Sesión";
                if (user.email === ADMIN_EMAIL) {
                    isUserAdmin = true;
                    welcomeMsg.innerHTML = `¡Hola, jefe! Eres el administrador.`;
                    welcomeMsg.style.color = "#4ade80";
                    formContainer.style.display = 'block';
                } else {
                    isUserAdmin = false;
                    welcomeMsg.innerHTML = `Hola, ${user.displayName}. Estás en modo visitante.`;
                    welcomeMsg.style.color = "#94a3b8";
                    formContainer.style.display = 'none';
                }
            } else {
                authBtn.innerText = "Iniciar Sesión";
                isUserAdmin = false;
                welcomeMsg.innerHTML = `Modo visitante. Solo lectura.`;
                welcomeMsg.style.color = "#94a3b8";
                formContainer.style.display = 'none';
            }
            cargarJuegos();
        });

        // --- 4. CARGAR Y PINTAR LA CUADRÍCULA ---
        async function cargarJuegos() {
            const list = document.getElementById('gameList');
            list.innerHTML = "<p style='text-align:center;'>Cargando galería...</p>";
            
            try {
                const q = query(juegosRef);
                const querySnapshot = await getDocs(q);
                let html = "";
                
                querySnapshot.forEach((docSnap) => {
                    const g = docSnap.data();
                    const coverImg = g.cover || "https://via.placeholder.com/400x500/1e293b/ffffff?text=Sin+Portada";
                    html += `
                        <div class="game-card">
                            <img src="${coverImg}" alt="${g.title}" class="game-cover">
                            <div class="game-info">
                                <div>
                                    <h3 class="game-title">${g.title}</h3>
                                    <div class="game-meta">
                                        <span>${g.status}</span>
                                        <span style="color: #60a5fa; font-weight: bold;">${g.score}/100</span>
                                    </div>
                                </div>
                                ${isUserAdmin ? `<button class="delete-btn" data-id="${docSnap.id}">🗑️ Eliminar</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                
                list.innerHTML = html ? `<div class="grid-coleccion">${html}</div>` : "<p style='text-align:center;'>Aún no hay juegos guardados.</p>";

                if (isUserAdmin) {
                    document.querySelectorAll('.delete-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = e.target.getAttribute('data-id');
                            e.target.innerText = "Borrando...";
                            e.target.disabled = true;
                            await deleteDoc(doc(db, "juegos", id));
                            cargarJuegos();
                        });
                    });
                }
            } catch (error) {
                list.innerHTML = `<p style='text-align:center; color:red;'>Error: ${error.message}</p>`;
            }
        }

        // --- 5. AÑADIR JUEGO ---
        document.getElementById('addBtn').addEventListener('click', async () => {
            if(!isUserAdmin) return;
            const statusInput = document.getElementById('gameStatus');
            const scoreInput = document.getElementById('gameScore');
            const btn = document.getElementById('addBtn');
            
            if(!titleInput.value) return;

            btn.innerText = "Guardando...";
            btn.disabled = true;

            try {
                await addDoc(juegosRef, { 
                    title: titleInput.value, 
                    status: statusInput.value, 
                    score: scoreInput.value || 0,
                    cover: selectedCover // ¡Ahora guardamos la imagen también!
                });

                titleInput.value = '';
                scoreInput.value = '';
                selectedCover = "https://via.placeholder.com/400x500/1e293b/ffffff?text=Sin+Portada";
                btn.innerText = "Añadir a mi colección";
                btn.disabled = false;
                
                cargarJuegos();
            } catch (error) {
                alert("Uy, algo ha fallado: " + error.message);
                btn.innerText = "Reintentar";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
